---
- name: secure Archon reference architecture passes every preventive control
  input:
    Resources:
      PlatformMarker:
        Type: AWS::ECS::Cluster
        Properties: {}
      Registry:
        Type: AWS::ECR::Repository
        Properties:
          ImageTagMutability: IMMUTABLE
          ImageScanningConfiguration:
            ScanOnPush: true
          EncryptionConfiguration:
            EncryptionType: KMS
            KmsKey: arn:aws:kms:eu-west-1:111111111111:key/registry
      SpaBucket:
        Type: AWS::S3::Bucket
        Properties:
          PublicAccessBlockConfiguration:
            BlockPublicAcls: true
            BlockPublicPolicy: true
            IgnorePublicAcls: true
            RestrictPublicBuckets: true
          BucketEncryption:
            ServerSideEncryptionConfiguration:
              - BucketKeyEnabled: true
                ServerSideEncryptionByDefault:
                  SSEAlgorithm: aws:kms
                  KMSMasterKeyID: arn:aws:kms:eu-west-1:111111111111:key/spa
          OwnershipControls:
            Rules:
              - ObjectOwnership: BucketOwnerEnforced
          Tags:
            - Key: ArchonBucketRole
              Value: application
            - Key: ArchonBucketPurpose
              Value: spa
          VersioningConfiguration:
            Status: Enabled
          LoggingConfiguration:
            DestinationBucketName: archon-log-archive
            LogFilePrefix: s3-access/spa/
      EvidenceBucket:
        Type: AWS::S3::Bucket
        Properties:
          PublicAccessBlockConfiguration:
            BlockPublicAcls: true
            BlockPublicPolicy: true
            IgnorePublicAcls: true
            RestrictPublicBuckets: true
          BucketEncryption:
            ServerSideEncryptionConfiguration:
              - BucketKeyEnabled: true
                ServerSideEncryptionByDefault:
                  SSEAlgorithm: aws:kms
                  KMSMasterKeyID: arn:aws:kms:eu-west-1:111111111111:key/evidence
          OwnershipControls:
            Rules:
              - ObjectOwnership: BucketOwnerEnforced
          Tags:
            - Key: ArchonBucketRole
              Value: application
            - Key: ArchonBucketPurpose
              Value: evidence
          VersioningConfiguration:
            Status: Enabled
          LoggingConfiguration:
            DestinationBucketName: archon-log-archive
            LogFilePrefix: s3-access/evidence/
          ObjectLockEnabled: true
          ObjectLockConfiguration:
            ObjectLockEnabled: Enabled
            Rule:
              DefaultRetention:
                Mode: GOVERNANCE
                Days: 30
      CloudFrontLogBucket:
        Type: AWS::S3::Bucket
        Properties:
          PublicAccessBlockConfiguration:
            BlockPublicAcls: true
            BlockPublicPolicy: true
            IgnorePublicAcls: true
            RestrictPublicBuckets: true
          BucketEncryption:
            ServerSideEncryptionConfiguration:
              - ServerSideEncryptionByDefault:
                  SSEAlgorithm: AES256
          OwnershipControls:
            Rules:
              - ObjectOwnership: ObjectWriter
          Tags:
            - Key: ArchonBucketRole
              Value: access-log-sink
            - Key: ArchonBucketPurpose
              Value: access-logs
          VersioningConfiguration:
            Status: Enabled
      DataKey:
        Type: AWS::KMS::Key
        Properties:
          EnableKeyRotation: true
          KeyPolicy:
            Version: "2012-10-17"
            Statement: []
      ApiLogs:
        Type: AWS::Logs::LogGroup
        Properties:
          KmsKeyId: arn:aws:kms:eu-west-1:111111111111:key/logs
          RetentionInDays: 365
      ApprovalTable:
        Type: AWS::DynamoDB::Table
        Properties:
          DeletionProtectionEnabled: true
          PointInTimeRecoverySpecification:
            PointInTimeRecoveryEnabled: true
          SSESpecification:
            SSEEnabled: true
            SSEType: KMS
            KMSMasterKeyId: arn:aws:kms:eu-west-1:111111111111:key/data
      AuditDlq:
        Type: AWS::SQS::Queue
        Properties:
          QueueName: archon-staging-audit-dlq
          KmsMasterKeyId: arn:aws:kms:eu-west-1:111111111111:key/queues
      AuditQueue:
        Type: AWS::SQS::Queue
        Properties:
          QueueName: archon-staging-audit-jobs
          KmsMasterKeyId: arn:aws:kms:eu-west-1:111111111111:key/queues
          RedrivePolicy:
            deadLetterTargetArn: arn:aws:sqs:eu-west-1:111111111111:audit-dlq
            maxReceiveCount: 5
      ApprovalDlq:
        Type: AWS::SQS::Queue
        Properties:
          QueueName: archon-staging-approval-dlq
          KmsMasterKeyId: arn:aws:kms:eu-west-1:111111111111:key/queues
      ApprovalQueue:
        Type: AWS::SQS::Queue
        Properties:
          QueueName: archon-staging-approval-events
          KmsMasterKeyId: arn:aws:kms:eu-west-1:111111111111:key/queues
          RedrivePolicy:
            deadLetterTargetArn: arn:aws:sqs:eu-west-1:111111111111:approval-dlq
            maxReceiveCount: 5
      RemediationDlq:
        Type: AWS::SQS::Queue
        Properties:
          QueueName: archon-staging-remediation-dlq
          KmsMasterKeyId: arn:aws:kms:eu-west-1:111111111111:key/queues
      RemediationQueue:
        Type: AWS::SQS::Queue
        Properties:
          QueueName: archon-staging-remediation-jobs
          KmsMasterKeyId: arn:aws:kms:eu-west-1:111111111111:key/queues
          RedrivePolicy:
            deadLetterTargetArn: arn:aws:sqs:eu-west-1:111111111111:remediation-dlq
            maxReceiveCount: 5
      ApiTask:
        Type: AWS::ECS::TaskDefinition
        Properties:
          ContainerDefinitions:
            - Name: Api
              ReadonlyRootFilesystem: true
              User: "1000"
              LogConfiguration:
                LogDriver: awslogs
      ApprovalFunction:
        Type: AWS::Lambda::Function
        Properties:
          Runtime: nodejs24.x
          ReservedConcurrentExecutions: 10
          TracingConfig:
            Mode: Active
          Environment:
            Variables:
              APPROVAL_TABLE: approval-table
              APPROVER_GROUP: archon-approvers
      ApiStage:
        Type: AWS::ApiGateway::Stage
        Properties:
          AccessLogSetting:
            DestinationArn: arn:aws:logs:eu-west-1:111111111111:log-group:api
            Format: '{"requestId":"$context.requestId"}'
          TracingEnabled: true
          CacheClusterEnabled: true
          MethodSettings:
            - ResourcePath: /~1api~1control-loops~1{auditId}
              HttpMethod: GET
              LoggingLevel: ERROR
              MetricsEnabled: true
              DataTraceEnabled: false
              CachingEnabled: true
              CacheDataEncrypted: true
              CacheTtlInSeconds: 2
      PrivateSubnet:
        Type: AWS::EC2::Subnet
        Properties:
          VpcId: vpc-12345678
          CidrBlock: 10.42.4.0/22
          MapPublicIpOnLaunch: false
      Distribution:
        Type: AWS::CloudFront::Distribution
        Properties:
          DistributionConfig:
            Enabled: true
            Aliases:
              - archon.example.com
            Logging:
              Bucket: logs.s3.amazonaws.com
            WebACLId: arn:aws:wafv2:us-east-1:111111111111:global/webacl/archon/00000000-0000-4000-8000-000000000000
            ViewerCertificate:
              AcmCertificateArn: arn:aws:acm:us-east-1:111111111111:certificate/00000000-0000-4000-8000-000000000000
              SslSupportMethod: sni-only
              MinimumProtocolVersion: TLSv1.3_2025
            DefaultCacheBehavior:
              ViewerProtocolPolicy: redirect-to-https
              FunctionAssociations:
                - EventType: viewer-request
                  FunctionARN: arn:aws:cloudfront::111111111111:function/archon-host
            CacheBehaviors:
              - PathPattern: api/*
                ViewerProtocolPolicy: https-only
                FunctionAssociations:
                  - EventType: viewer-request
                    FunctionARN: arn:aws:cloudfront::111111111111:function/archon-host
            Origins:
              - Id: SpaOrigin
                DomainName: spa.s3.amazonaws.com
                OriginAccessControlId: oac-123
      ReadSecret:
        Type: AWS::SecretsManager::Secret
        Properties:
          KmsKeyId: arn:aws:kms:eu-west-1:111111111111:key/secrets
      RegionalWebAcl:
        Type: AWS::WAFv2::WebACL
        Properties:
          Scope: REGIONAL
          DefaultAction:
            Allow: {}
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: archon-staging-api-waf
            SampledRequestsEnabled: true
          DataProtectionConfig:
            DataProtections:
              - Action: SUBSTITUTION
                ExcludeRateBasedDetails: false
                ExcludeRuleMatchDetails: false
                Field:
                  FieldType: SINGLE_HEADER
                  FieldKeys:
                    - authorization
              - Action: SUBSTITUTION
                ExcludeRateBasedDetails: false
                ExcludeRuleMatchDetails: false
                Field:
                  FieldType: SINGLE_HEADER
                  FieldKeys:
                    - cookie
      ApiWafLogging:
        Type: AWS::WAFv2::LoggingConfiguration
        Properties:
          ResourceArn: arn:aws:wafv2:eu-west-1:111111111111:regional/webacl/archon/id
          LogDestinationConfigs:
            - arn:aws:logs:eu-west-1:111111111111:log-group:aws-waf-logs-archon-staging-api
          LoggingFilter:
            DefaultBehavior: DROP
            Filters:
              - Behavior: KEEP
                Requirement: MEETS_ANY
                Conditions:
                  - ActionCondition:
                      Action: BLOCK
                  - ActionCondition:
                      Action: COUNT
          RedactedFields:
            - SingleHeader:
                Name: authorization
            - SingleHeader:
                Name: cookie
      ApiWafAssociation:
        Type: AWS::WAFv2::WebACLAssociation
        Properties:
          ResourceArn: arn:aws:apigateway:eu-west-1::/restapis/example/stages/staging
          WebACLArn: arn:aws:wafv2:eu-west-1:111111111111:regional/webacl/archon/id
  expectations:
    rules:
      ecr_repositories_are_hardened: PASS
      s3_buckets_are_private_and_encrypted: PASS
      platform_has_s3_server_access_logging: PASS
      platform_has_versioned_object_locked_evidence_store: PASS
      kms_keys_rotate: PASS
      retained_logs_are_encrypted: PASS
      dynamodb_tables_are_resilient_and_encrypted: PASS
      sqs_queues_are_encrypted: PASS
      platform_source_queues_use_dead_letter_queues: PASS
      ecs_task_containers_are_hardened: PASS
      platform_approval_lambda_is_hardened: PASS
      lambda_functions_enable_active_xray: PASS
      subnets_never_auto_assign_public_ips: PASS
      api_gateway_stages_are_observable: PASS
      cloudfront_distributions_enforce_tls_logging_and_oac: PASS
      secrets_use_customer_managed_kms: PASS
      waf_web_acls_protect_sensitive_sampled_data: PASS
      waf_logging_is_filtered_and_redacted: PASS
      platform_has_regional_waf: PASS

- name: mutable unscanned ECR repositories are rejected
  input:
    Resources:
      Registry:
        Type: AWS::ECR::Repository
        Properties:
          ImageTagMutability: MUTABLE
          ImageScanningConfiguration:
            ScanOnPush: false
          EncryptionConfiguration:
            EncryptionType: AES256
  expectations:
    rules:
      ecr_repositories_are_hardened: FAIL

- name: publicly reachable unencrypted S3 buckets are rejected
  input:
    Resources:
      PublicBucket:
        Type: AWS::S3::Bucket
        Properties:
          PublicAccessBlockConfiguration:
            BlockPublicAcls: false
            BlockPublicPolicy: false
            IgnorePublicAcls: false
            RestrictPublicBuckets: false
          BucketEncryption:
            ServerSideEncryptionConfiguration: []
  expectations:
    rules:
      s3_buckets_are_private_and_encrypted: FAIL

- name: a platform without object locked evidence is rejected
  input:
    Resources:
      PlatformMarker:
        Type: AWS::ECS::Cluster
        Properties: {}
  expectations:
    rules:
      platform_has_versioned_object_locked_evidence_store: FAIL

- name: object lock on a non-evidence bucket cannot satisfy evidence retention
  input:
    Resources:
      PlatformMarker:
        Type: AWS::ECS::Cluster
        Properties: {}
      MisidentifiedLockedBucket:
        Type: AWS::S3::Bucket
        Properties:
          Tags:
            - Key: ArchonBucketPurpose
              Value: spa
          VersioningConfiguration:
            Status: Enabled
          ObjectLockEnabled: true
          ObjectLockConfiguration:
            ObjectLockEnabled: Enabled
            Rule:
              DefaultRetention:
                Mode: GOVERNANCE
                Days: 30
      EvidenceWithoutLock:
        Type: AWS::S3::Bucket
        Properties:
          Tags:
            - Key: ArchonBucketPurpose
              Value: evidence
          VersioningConfiguration:
            Status: Enabled
  expectations:
    rules:
      platform_has_versioned_object_locked_evidence_store: FAIL

