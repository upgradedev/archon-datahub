name: CI

# Archon-DataHub CI — gitleaks-first, then typecheck → build → test → coverage gate.
# Runs FULLY OFFLINE: with no DATAHUB_MCP_URL and no LLM_API_KEY the agent auto-falls
# back to the deterministic Fakes (Fake DataHub MCP + Fake LLM), so the whole pipeline
# is exercised end-to-end with zero secrets and zero network. The coverage gate
# (c8, ≥80% lines/branches/functions/statements) is enforced by .c8rc.json.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Stage 1 — fail fast on any committed secret.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks detect (pinned v8.18.4, redacted)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  # Stage 2 — typecheck, test, and enforce the coverage gate.
  build-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Coverage gate (c8 ≥80%)
        run: npm run coverage

  # Stage 3 — readiness gate. Encodes the hackathon criteria as machine-checkable checks
  # with REAL evidence (runs the pipeline, ReAct loop, MCP round-trip, and the live
  # contradiction-recovery path; statically verifies the read-only tool surface + docs/NOTICE
  # consistency). Fails the build if the automatable completeness drops below 95%.
  readiness:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Readiness gate (automatable ≥ 95%)
        run: npm run readiness

  # Stage 4 — dependency vulnerability audit (fails on high/critical).
  dep-audit:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  # Stage 5 — application-security PEN-TEST gate. Runs the real security suite (authz /
  # tool-boundary, prompt-injection, governance/contradiction-engine injection, sensitive-
  # data-exposure) AND the SCA/CVE gate (npm audit). Fully offline — Fakes, no creds.
  pen-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Security suite (authz · prompt-injection · engine-injection · data-exposure)
        run: npm run test:security
      - name: SCA / CVE gate (npm audit, fail on high/critical)
        run: npm audit --audit-level=high

  # Stage 6 — LOAD test. Drives the audit/recall hot path under concurrency against the
  # offline Fake backend and asserts the SLO (hard gate: error_rate == 0; p95 under budget).
  # Bounded iterations; a breach exits non-zero and reddens the build.
  load:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Load test (offline, SLO-gated)
        run: npm run load
