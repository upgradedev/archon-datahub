name: Workflow security

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: "1.7.12"
  ACTIONLINT_ARCHIVE_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8

jobs:
  validate:
    name: Actionlint and zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install checksum-pinned actionlint
        id: actionlint
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/actionlint.tar.gz"
          tool_dir="${RUNNER_TEMP}/actionlint"
          mkdir -p "${tool_dir}"
          curl --fail --silent --show-error --location \
            --output "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_ARCHIVE_SHA256}  ${archive}" |
            sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${tool_dir}" actionlint
          chmod 0755 "${tool_dir}/actionlint"
          "${tool_dir}/actionlint" -version
          echo "bin=${tool_dir}/actionlint" >>"${GITHUB_OUTPUT}"

      - name: Validate every GitHub Actions workflow
        env:
          ACTIONLINT_BIN: ${{ steps.actionlint.outputs.bin }}
        run: |
          set -euo pipefail
          "${ACTIONLINT_BIN}" -color

      - name: Audit workflow security and supply-chain usage
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: 1.27.0
          collect: all
          persona: auditor
          min-severity: medium
          min-confidence: high
          online-audits: true
          advanced-security: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
          annotations: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
