name: Governed DataHub canary

run-name: Governed canary for ${{ inputs.release_sha }} from deployment ${{ inputs.deployment_run_id }}

on:
  workflow_dispatch:
    inputs:
      deployment_run_id:
        description: Successful immutable deployment run that produced the staging URL
        required: true
        type: string
      release_sha:
        description: Exact deployed 40-character release SHA
        required: true
        type: string
      confirmation:
        description: Type RUN ISOLATED GOVERNED CANARY
        required: true
        type: string

# This workflow is intentionally manual-only. It never targets the production stack.
# A read-only preparation job seals the exact plan before either protected gate.
# The first protected environment approves that content-addressed GOVERNED write
# on a disposable TEST/DEV fixture. The second protected environment separately
# approves the content-addressed inverse action and owns the rollback credential.
permissions:
  actions: read
  contents: read

concurrency:
  group: archon-governed-canary
  cancel-in-progress: false

env:
  NODE_VERSION: "22.23.1"
  AWS_PAGER: ""
  CANARY_STACK_NAME: Archon-staging
  CANARY_SOURCE_WORKFLOW_RUN_ID: ${{ github.run_id }}
  CANARY_SOURCE_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
  CANARY_QUERY: archon_governed_canary_fixture
  CANARY_COLUMN_PATH: email
  CANARY_TAG_URN: urn:li:tag:PII

defaults:
  run:
    shell: bash

jobs:
  prepare:
    name: Read-only preparation of immutable governed plan
    if: >-
      github.repository == 'upgradedev/archon-datahub' &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      id-token: write
    outputs:
      recovery_digest: ${{ steps.prepare.outputs.recovery_digest }}
      plan_digest: ${{ steps.prepare.outputs.plan_digest }}
      audit_id: ${{ steps.prepare.outputs.audit_id }}
      application_url: ${{ steps.stack.outputs.application_url }}
      evidence_bucket: ${{ steps.stack.outputs.evidence_bucket }}
      cognito_client_id: ${{ steps.stack.outputs.cognito_client_id }}
      cognito_hosted_ui_origin: ${{ steps.stack.outputs.cognito_hosted_ui_origin }}
    env:
      CANARY_DEPLOYMENT_RUN_ID: ${{ inputs.deployment_run_id }}
      CANARY_RELEASE_SHA: ${{ inputs.release_sha }}
      CANARY_APPLICATION_URL: ${{ vars.CANARY_APPLICATION_URL }}
      CANARY_DATASET_URN: ${{ vars.CANARY_DATASET_URN }}
      CANARY_ISOLATION_MARKER: ${{ vars.CANARY_ISOLATION_MARKER }}
      CANARY_DATAHUB_READ_GMS_URL: ${{ vars.CANARY_DATAHUB_READ_GMS_URL }}
      CANARY_DATAHUB_READ_MCP_URL: ${{ vars.CANARY_DATAHUB_READ_MCP_URL }}
      CANARY_DATAHUB_WRITE_GMS_URL: ${{ vars.CANARY_DATAHUB_WRITE_GMS_URL }}
      CANARY_DATAHUB_WRITE_MCP_URL: ${{ vars.CANARY_DATAHUB_WRITE_MCP_URL }}
    steps:
      - name: Validate protected environments and immutable deployment source
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          test "${CONFIRMATION}" = "RUN ISOLATED GOVERNED CANARY" || {
            echo "::error::The exact canary confirmation phrase is required"
            exit 1
          }
          [[ "${CANARY_DEPLOYMENT_RUN_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${CANARY_RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]

          repository_json="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}")"
          default_branch="$(jq -er '.default_branch' <<<"${repository_json}")"
          test "${GITHUB_REF}" = "refs/heads/${default_branch}"

          for environment_name in governed-canary governed-canary-rollback; do
            environment_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${GITHUB_REPOSITORY}/environments/${environment_name}")"
            jq -e --arg name "${environment_name}" '
              .name == $name and
              .deployment_branch_policy.protected_branches == false and
              .deployment_branch_policy.custom_branch_policies == true and
              any(
                .protection_rules[]?;
                .type == "required_reviewers" and
                .prevent_self_review == true and
                (.reviewers | length) >= 1
              )
            ' <<<"${environment_json}" >/dev/null || {
              echo "::error::${environment_name} needs required reviewers, prevent-self-review, and a custom branch policy"
              exit 1
            }
            branch_policies="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${GITHUB_REPOSITORY}/environments/${environment_name}/deployment-branch-policies?per_page=100")"
            jq -e --arg branch "${default_branch}" '
              .total_count == 1 and .branch_policies[0].name == $branch
            ' <<<"${branch_policies}" >/dev/null || {
              echo "::error::${environment_name} must allow only the default branch"
              exit 1
            }
          done

          run_json="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${CANARY_DEPLOYMENT_RUN_ID}")"
          jq -e \
            --arg branch "${default_branch}" \
            --arg repository "${GITHUB_REPOSITORY}" '
            .name == "Deploy immutable AWS release" and
            .path == ".github/workflows/deploy.yml" and
            .head_repository.full_name == $repository and
            .event == "workflow_dispatch" and
            .status == "completed" and
            .conclusion == "success" and
            .head_branch == $branch
          ' <<<"${run_json}" >/dev/null || {
            echo "::error::The source must be a successful default-branch immutable deployment"
            exit 1
          }

          artifacts_json="$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${CANARY_DEPLOYMENT_RUN_ID}/artifacts?per_page=100")"
          run_attempt="$(jq -er '.run_attempt | select(type == "number" and . >= 1)' \
            <<<"${run_json}")"
          expected_artifact="staging-deployment-evidence-${CANARY_RELEASE_SHA}-${run_attempt}"
          mapfile -t names < <(jq -r --arg name "${expected_artifact}" '
              .artifacts[] |
              select(.expired == false and .name == $name) |
              .name
            ' <<<"${artifacts_json}")
          test "${#names[@]}" = "1" || {
            echo "::error::Exactly one retained staging deployment evidence artifact is required"
            exit 1
          }
          evidence_dir="${RUNNER_TEMP}/source-deployment-evidence"
          mkdir -p "${evidence_dir}"
          gh run download "${CANARY_DEPLOYMENT_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${names[0]}" \
            --dir "${evidence_dir}"
          mapfile -t evidence_files < <(
            find "${evidence_dir}" -type f \
              -name 'staging-deployment-evidence.json' -print
          )
          test "${#evidence_files[@]}" = "1"
          evidence="${evidence_files[0]}"
          jq -e \
            --arg release "${CANARY_RELEASE_SHA}" \
            --arg application "${CANARY_APPLICATION_URL}" \
            --arg runUrl \
              "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${CANARY_DEPLOYMENT_RUN_ID}" '
              .schemaVersion == 1 and
              .environment == "staging" and
              .source.releaseSha == $release and
              .deployment.stackName == "Archon-staging" and
              .deployment.deploymentRunUrl == $runUrl and
              .deployment.applicationUrl == $application and
              .verification.result == "passed" and
              .verification.dast.result == "passed"
            ' "${evidence}" >/dev/null || {
            echo "::error::Staging evidence does not bind the requested release and URL"
            exit 1
          }
          echo "deployment_evidence=${evidence}" >>"${GITHUB_OUTPUT}"

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install the reviewed, locked canary driver
        run: npm ci --ignore-scripts

      - name: Assume the read-only canary evidence role
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ vars.AWS_CANARY_PREPARE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          role-session-name: archon-canary-${{ github.run_id }}

      - name: Fail closed on stack and isolated endpoint bindings
        id: stack
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DEPLOYMENT_EVIDENCE: ${{ steps.source.outputs.deployment_evidence }}
        run: |
          set -euo pipefail
          : "${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID is required}"
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${CANARY_APPLICATION_URL:?CANARY_APPLICATION_URL is required}"
          : "${CANARY_DATASET_URN:?CANARY_DATASET_URN is required}"
          : "${CANARY_ISOLATION_MARKER:?CANARY_ISOLATION_MARKER is required}"
          : "${CANARY_DATAHUB_READ_GMS_URL:?CANARY_DATAHUB_READ_GMS_URL is required}"
          : "${CANARY_DATAHUB_READ_MCP_URL:?CANARY_DATAHUB_READ_MCP_URL is required}"
          : "${CANARY_DATAHUB_WRITE_GMS_URL:?CANARY_DATAHUB_WRITE_GMS_URL is required}"
          : "${CANARY_DATAHUB_WRITE_MCP_URL:?CANARY_DATAHUB_WRITE_MCP_URL is required}"

          caller_account="$(aws sts get-caller-identity --query Account --output text)"
          test "${caller_account}" = "${AWS_ACCOUNT_ID}"
          stack_json="${RUNNER_TEMP}/canary-stack.json"
          aws cloudformation describe-stacks \
            --stack-name "${CANARY_STACK_NAME}" >"${stack_json}"
          jq -e '
            .Stacks | length == 1 and
            .[0].StackName == "Archon-staging" and
            (.[0].StackStatus | endswith("_COMPLETE"))
          ' "${stack_json}" >/dev/null

          parameter() {
            jq -er --arg key "$1" '
              .Stacks[0].Parameters[] |
              select(.ParameterKey == $key) |
              .ParameterValue
            ' "${stack_json}"
          }
          output() {
            jq -er --arg key "$1" '
              .Stacks[0].Outputs[] |
              select(.OutputKey == $key) |
              .OutputValue
            ' "${stack_json}"
          }
          test "$(parameter ReleaseSha)" = "${CANARY_RELEASE_SHA}"
          test "$(parameter WorkerDesiredCount)" = "1"
          test "$(parameter DataHubReadGmsUrl)" = "${CANARY_DATAHUB_READ_GMS_URL}"
          test "$(parameter DataHubReadMcpUrl)" = "${CANARY_DATAHUB_READ_MCP_URL}"
          test "$(parameter DataHubWriteGmsUrl)" = "${CANARY_DATAHUB_WRITE_GMS_URL}"
          test "$(parameter DataHubWriteMcpUrl)" = "${CANARY_DATAHUB_WRITE_MCP_URL}"
          application_url="$(output ArchonApplicationUrl)"
          evidence_bucket="$(output ArchonEvidenceBucketName)"
          cognito_client_id="$(output ArchonUserPoolClientId)"
          cognito_origin="$(output ArchonCognitoHostedUiOrigin)"
          authorization_endpoint="$(output ArchonCognitoAuthorizationEndpoint)"
          token_endpoint="$(output ArchonCognitoTokenEndpoint)"
          test "${application_url}" = "${CANARY_APPLICATION_URL}"
          [[ "${cognito_client_id}" =~ ^[A-Za-z0-9]{8,128}$ ]]
          [[ "${cognito_origin}" =~ ^https://[a-z0-9.-]+$ ]]
          test "${authorization_endpoint}" = "${cognito_origin}/oauth2/authorize"
          test "${token_endpoint}" = "${cognito_origin}/oauth2/token"
          test "$(jq -er '.deployment.applicationUrl' \
            "${DEPLOYMENT_EVIDENCE}")" = \
            "${application_url}"
          {
            echo "application_url=${application_url}"
            echo "evidence_bucket=${evidence_bucket}"
            echo "cognito_client_id=${cognito_client_id}"
            echo "cognito_hosted_ui_origin=${cognito_origin}"
          } >>"${GITHUB_OUTPUT}"

      - name: Prepare and validate the exact governed plan
        id: prepare
        env:
          CANARY_APPLICATION_URL: ${{ steps.stack.outputs.application_url }}
          CANARY_EVIDENCE_BUCKET: ${{ steps.stack.outputs.evidence_bucket }}
          CANARY_COGNITO_CLIENT_ID: ${{ steps.stack.outputs.cognito_client_id }}
          CANARY_COGNITO_HOSTED_UI_ORIGIN: ${{ steps.stack.outputs.cognito_hosted_ui_origin }}
          CANARY_RECOVERY_PATH: ${{ runner.temp }}/governed-canary/recovery.json
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${CANARY_RECOVERY_PATH}")"
          node --import tsx scripts/governed-canary.ts prepare
          chmod 0600 "${CANARY_RECOVERY_PATH}"
          recovery_digest="$(jq -er \
            '.recoveryDigest | select(test("^sha256:[a-f0-9]{64}$"))' \
            "${CANARY_RECOVERY_PATH}")"
          audit_id="$(jq -er \
            '.auditId | select(test("^[a-f0-9]{64}$"))' \
            "${CANARY_RECOVERY_PATH}")"
          approval_id="$(jq -er '.approvalId' "${CANARY_RECOVERY_PATH}")"
          approval_expires_at="$(jq -er '.approvalExpiresAt' "${CANARY_RECOVERY_PATH}")"
          plan_digest="$(jq -er '.planDigest' "${CANARY_RECOVERY_PATH}")"
          auth_binding_digest="$(jq -er '.authBindingsDigest' "${CANARY_RECOVERY_PATH}")"
          target_urn="$(jq -er '.target.entityUrn' "${CANARY_RECOVERY_PATH}")"
          before_digest="$(jq -er '.expectedBefore.digest' "${CANARY_RECOVERY_PATH}")"
          after_digest="$(jq -er '.expectedAfter.digest' "${CANARY_RECOVERY_PATH}")"
          {
            echo "path=${CANARY_RECOVERY_PATH}"
            echo "recovery_digest=${recovery_digest}"
            echo "audit_id=${audit_id}"
            echo "approval_id=${approval_id}"
            echo "plan_digest=${plan_digest}"
          } >>"${GITHUB_OUTPUT}"
          {
            echo "### Governed plan sealed before mutation"
            echo
            echo "- Release: \`${CANARY_RELEASE_SHA}\`"
            echo "- Audit: \`${audit_id}\`"
            echo "- Approval: \`${approval_id}\`"
            echo "- Approval expires: \`${approval_expires_at}\`"
            echo "- Plan: \`${plan_digest}\`"
            echo "- Staging Cognito binding: \`${auth_binding_digest}\`"
            echo "- Recovery binding: \`${recovery_digest}\`"
            echo "- Target: \`${target_urn}#${CANARY_COLUMN_PATH}\`"
            echo "- Transition: \`${before_digest}\` → \`${after_digest}\`"
            echo "- Exact write/inverse: \`add_tags(urn:li:tag:PII)\` / \`remove_tags(urn:li:tag:PII)\`"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Seal recovery state before approval
        id: recovery
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: governed-canary-recovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.prepare.outputs.path }}
          if-no-files-found: error
          retention-days: 90

  approval:
    name: Human approval — plan ${{ needs.prepare.outputs.plan_digest }} / recovery ${{ needs.prepare.outputs.recovery_digest }}
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    environment:
      name: governed-canary
      url: ${{ vars.CANARY_APPLICATION_URL }}
    outputs:
      rollback_proposal_digest: ${{ steps.approve.outputs.rollback_proposal_digest }}
      receipt_digest: ${{ steps.approve.outputs.receipt_digest }}
    env:
      CANARY_DEPLOYMENT_RUN_ID: ${{ inputs.deployment_run_id }}
      CANARY_RELEASE_SHA: ${{ inputs.release_sha }}
      CANARY_APPLICATION_URL: ${{ vars.CANARY_APPLICATION_URL }}
      CANARY_EVIDENCE_BUCKET: ${{ needs.prepare.outputs.evidence_bucket }}
      CANARY_COGNITO_CLIENT_ID: ${{ needs.prepare.outputs.cognito_client_id }}
      CANARY_COGNITO_HOSTED_UI_ORIGIN: ${{ needs.prepare.outputs.cognito_hosted_ui_origin }}
      CANARY_DATASET_URN: ${{ vars.CANARY_DATASET_URN }}
      CANARY_ISOLATION_MARKER: ${{ vars.CANARY_ISOLATION_MARKER }}
      CANARY_DATAHUB_READ_GMS_URL: ${{ vars.CANARY_DATAHUB_READ_GMS_URL }}
      CANARY_DATAHUB_READ_MCP_URL: ${{ vars.CANARY_DATAHUB_READ_MCP_URL }}
      CANARY_DATAHUB_WRITE_GMS_URL: ${{ vars.CANARY_DATAHUB_WRITE_GMS_URL }}
      CANARY_DATAHUB_WRITE_MCP_URL: ${{ vars.CANARY_DATAHUB_WRITE_MCP_URL }}
      CANARY_CHROME_VERSION: ${{ vars.CANARY_CHROME_VERSION }}
      CANARY_CHROME_BINARY_SHA256: ${{ vars.CANARY_CHROME_BINARY_SHA256 }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install the reviewed, locked approval driver
        run: npm ci --ignore-scripts

      - name: Download the exact pre-mutation plan approved by this job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: governed-canary-recovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/governed-canary/recovery

      - name: Revalidate both protected gates immediately before approval
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          default_branch="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}" --jq '.default_branch')"
          for environment_name in governed-canary governed-canary-rollback; do
            environment_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${GITHUB_REPOSITORY}/environments/${environment_name}")"
            jq -e --arg name "${environment_name}" '
              .name == $name and
              .deployment_branch_policy.protected_branches == false and
              .deployment_branch_policy.custom_branch_policies == true and
              any(
                .protection_rules[]?;
                .type == "required_reviewers" and
                .prevent_self_review == true and
                (.reviewers | length) >= 1
              )
            ' <<<"${environment_json}" >/dev/null
            branch_policies="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "/repos/${GITHUB_REPOSITORY}/environments/${environment_name}/deployment-branch-policies?per_page=100")"
            jq -e --arg branch "${default_branch}" '
              .total_count == 1 and .branch_policies[0].name == $branch
            ' <<<"${branch_policies}" >/dev/null
          done

      - name: Assume the read-only canary evidence role
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ vars.AWS_CANARY_APPROVAL_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          role-session-name: archon-canary-approval-${{ github.run_id }}

      - name: Revalidate the protected release, endpoints, and approver identity
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CANARY_COGNITO_USERNAME: ${{ secrets.CANARY_COGNITO_USERNAME }}
          CANARY_RECOVERY_PATH: ${{ runner.temp }}/governed-canary/recovery/recovery.json
          EXPECTED_AUDIT_ID: ${{ needs.prepare.outputs.audit_id }}
          EXPECTED_PLAN_DIGEST: ${{ needs.prepare.outputs.plan_digest }}
          EXPECTED_RECOVERY_DIGEST: ${{ needs.prepare.outputs.recovery_digest }}
        run: |
          set -euo pipefail
          : "${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID is required}"
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${CANARY_COGNITO_USERNAME:?CANARY_COGNITO_USERNAME is required}"
          echo "::add-mask::${CANARY_COGNITO_USERNAME}"
          test -f "${CANARY_RECOVERY_PATH}"
          test ! -L "${CANARY_RECOVERY_PATH}"
          test "$(jq -er '.auditId' "${CANARY_RECOVERY_PATH}")" = \
            "${EXPECTED_AUDIT_ID}"
          test "$(jq -er '.planDigest' "${CANARY_RECOVERY_PATH}")" = \
            "${EXPECTED_PLAN_DIGEST}"
          test "$(jq -er '.recoveryDigest' "${CANARY_RECOVERY_PATH}")" = \
            "${EXPECTED_RECOVERY_DIGEST}"
          umask 077
          identity_dir="${RUNNER_TEMP}/canary-cognito-identity"
          mkdir -p "${identity_dir}"
          trap 'find "${identity_dir}" -type f -exec shred -u {} + 2>/dev/null || true' EXIT

          caller_account="$(aws sts get-caller-identity --query Account --output text)"
          test "${caller_account}" = "${AWS_ACCOUNT_ID}"
          stack_json="${identity_dir}/stack.json"
          aws cloudformation describe-stacks \
            --stack-name "${CANARY_STACK_NAME}" >"${stack_json}"
          jq -e '
            .Stacks | length == 1 and
            .[0].StackName == "Archon-staging" and
            (.[0].StackStatus | endswith("_COMPLETE"))
          ' "${stack_json}" >/dev/null
          parameter() {
            jq -er --arg key "$1" '
              .Stacks[0].Parameters[] |
              select(.ParameterKey == $key) |
              .ParameterValue
            ' "${stack_json}"
          }
          output() {
            jq -er --arg key "$1" '
              .Stacks[0].Outputs[] |
              select(.OutputKey == $key) |
              .OutputValue
            ' "${stack_json}"
          }
          test "$(parameter ReleaseSha)" = "${CANARY_RELEASE_SHA}"
          test "$(parameter WorkerDesiredCount)" = "1"
          test "$(parameter DataHubReadGmsUrl)" = "${CANARY_DATAHUB_READ_GMS_URL}"
          test "$(parameter DataHubReadMcpUrl)" = "${CANARY_DATAHUB_READ_MCP_URL}"
          test "$(parameter DataHubWriteGmsUrl)" = "${CANARY_DATAHUB_WRITE_GMS_URL}"
          test "$(parameter DataHubWriteMcpUrl)" = "${CANARY_DATAHUB_WRITE_MCP_URL}"
          test "$(output ArchonApplicationUrl)" = "${CANARY_APPLICATION_URL}"
          test "$(output ArchonEvidenceBucketName)" = "${CANARY_EVIDENCE_BUCKET}"
          test "$(output ArchonUserPoolClientId)" = "${CANARY_COGNITO_CLIENT_ID}"
          test "$(output ArchonCognitoHostedUiOrigin)" = \
            "${CANARY_COGNITO_HOSTED_UI_ORIGIN}"
          test "$(output ArchonCognitoAuthorizationEndpoint)" = \
            "${CANARY_COGNITO_HOSTED_UI_ORIGIN}/oauth2/authorize"
          test "$(output ArchonCognitoTokenEndpoint)" = \
            "${CANARY_COGNITO_HOSTED_UI_ORIGIN}/oauth2/token"
          user_pool_id="$(output ArchonUserPoolId)"
          approver_group="$(output ArchonApproverGroupName)"
          test "${approver_group}" = "archon-approvers"

          aws cognito-idp admin-get-user \
            --user-pool-id "${user_pool_id}" \
            --username "${CANARY_COGNITO_USERNAME}" \
            >"${identity_dir}/user.json"
          jq -e '
            .Enabled == true and
            .UserStatus == "CONFIRMED"
          ' "${identity_dir}/user.json" >/dev/null
          aws cognito-idp admin-list-groups-for-user \
            --user-pool-id "${user_pool_id}" \
            --username "${CANARY_COGNITO_USERNAME}" \
            >"${identity_dir}/groups.json"
          jq -e --arg group "${approver_group}" '
            [.Groups[].GroupName] == [$group]
          ' "${identity_dir}/groups.json" >/dev/null

      - name: Bind deployed runtime auth before any browser or password use
        run: |
          set -euo pipefail
          runtime_config="${RUNNER_TEMP}/governed-canary-runtime-config.json"
          trap 'rm -f "${runtime_config}"' EXIT
          curl --fail --silent --show-error \
            --proto '=https' \
            --max-time 35 \
            -H 'Accept: application/json' \
            "${CANARY_APPLICATION_URL}/runtime-config.json" \
            -o "${runtime_config}"
          test -f "${runtime_config}"
          test ! -L "${runtime_config}"
          jq -e \
            --arg client "${CANARY_COGNITO_CLIENT_ID}" \
            --arg origin "${CANARY_COGNITO_HOSTED_UI_ORIGIN}" \
            --arg redirect "${CANARY_APPLICATION_URL}/" '
              .schemaVersion == 1 and
              .auth.clientId == $client and
              .auth.authorizationEndpoint == ($origin + "/oauth2/authorize") and
              .auth.tokenEndpoint == ($origin + "/oauth2/token") and
              .auth.redirectUri == $redirect and
              .auth.scopes == ["openid", "email", "archon/approve"]
            ' "${runtime_config}" >/dev/null

      - name: Authenticate with Cognito PKCE, approve, and verify receipt
        id: approve
        env:
          CANARY_RECOVERY_PATH: ${{ runner.temp }}/governed-canary/recovery/recovery.json
          CANARY_ROLLBACK_PATH: ${{ runner.temp }}/governed-canary/rollback.json
          CANARY_EXPECTED_AUDIT_ID: ${{ needs.prepare.outputs.audit_id }}
          CANARY_EXPECTED_PLAN_DIGEST: ${{ needs.prepare.outputs.plan_digest }}
          CANARY_EXPECTED_RECOVERY_DIGEST: ${{ needs.prepare.outputs.recovery_digest }}
          CANARY_COGNITO_USERNAME: ${{ secrets.CANARY_COGNITO_USERNAME }}
          CANARY_COGNITO_PASSWORD: ${{ secrets.CANARY_COGNITO_PASSWORD }}
          CANARY_CHROME_PROFILE: ${{ runner.temp }}/governed-canary/chrome-profile
        run: |
          set -euo pipefail
          chrome_bin="$(command -v google-chrome-stable || command -v google-chrome)"
          test -x "${chrome_bin}"
          [[ "${CANARY_CHROME_BINARY_SHA256}" =~ ^[0-9a-f]{64}$ ]]
          : "${CANARY_CHROME_VERSION:?CANARY_CHROME_VERSION is required}"
          test "$("${chrome_bin}" --product-version)" = "${CANARY_CHROME_VERSION}"
          chrome_resolved="$(readlink -f "${chrome_bin}")"
          chrome_payload="$(dirname "${chrome_resolved}")/chrome"
          test -x "${chrome_payload}"
          test "$(sha256sum "${chrome_payload}" | awk '{print $1}')" = \
            "${CANARY_CHROME_BINARY_SHA256}"
          export CANARY_CHROME_BIN="${chrome_bin}"
          node --import tsx scripts/governed-canary.ts approve
          chmod 0600 "${CANARY_ROLLBACK_PATH}"
          proposal_digest="$(jq -er \
            '.proposal.digest | select(test("^sha256:[a-f0-9]{64}$"))' \
            "${CANARY_ROLLBACK_PATH}")"
          receipt_digest="$(jq -er '.receiptDigest' "${CANARY_ROLLBACK_PATH}")"
          {
            echo "path=${CANARY_ROLLBACK_PATH}"
            echo "rollback_proposal_digest=${proposal_digest}"
            echo "receipt_digest=${receipt_digest}"
          } >>"${GITHUB_OUTPUT}"
          {
            echo
            echo "### Governed write verified"
            echo
            echo "- Outcome: \`VERIFIED\`"
            echo "- Receipt: \`${receipt_digest}\`"
            echo "- Fresh rollback proposal: \`${proposal_digest}\`"
            echo "- Chrome payload: \`${CANARY_CHROME_VERSION}\` / \`sha256:${CANARY_CHROME_BINARY_SHA256}\`"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Retain verified write and rollback proposal
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: governed-canary-write-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/governed-canary/rollback.json
          if-no-files-found: ignore
          retention-days: 90

  rollback:
    name: Fresh rollback approval — ${{ needs.approval.outputs.rollback_proposal_digest || needs.prepare.outputs.recovery_digest }}
    needs:
      - prepare
      - approval
    if: >-
      always() &&
      needs.prepare.outputs.recovery_digest != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      attestations: write
      contents: read
      deployments: write
      id-token: write
    environment:
      name: governed-canary-rollback
      url: ${{ vars.CANARY_APPLICATION_URL }}
    env:
      CANARY_DEPLOYMENT_RUN_ID: ${{ inputs.deployment_run_id }}
      CANARY_RELEASE_SHA: ${{ inputs.release_sha }}
      CANARY_APPLICATION_URL: ${{ vars.CANARY_APPLICATION_URL }}
      CANARY_EVIDENCE_BUCKET: ${{ vars.CANARY_EVIDENCE_BUCKET }}
      CANARY_COGNITO_CLIENT_ID: ${{ needs.prepare.outputs.cognito_client_id }}
      CANARY_COGNITO_HOSTED_UI_ORIGIN: ${{ needs.prepare.outputs.cognito_hosted_ui_origin }}
      CANARY_DATASET_URN: ${{ vars.CANARY_DATASET_URN }}
      CANARY_ISOLATION_MARKER: ${{ vars.CANARY_ISOLATION_MARKER }}
      CANARY_DATAHUB_READ_GMS_URL: ${{ vars.CANARY_DATAHUB_READ_GMS_URL }}
      CANARY_DATAHUB_READ_MCP_URL: ${{ vars.CANARY_DATAHUB_READ_MCP_URL }}
      CANARY_DATAHUB_WRITE_GMS_URL: ${{ vars.CANARY_DATAHUB_WRITE_GMS_URL }}
      CANARY_DATAHUB_WRITE_MCP_URL: ${{ vars.CANARY_DATAHUB_WRITE_MCP_URL }}
      CANARY_WRITE_JOB_RESULT: ${{ needs.approval.result }}
    steps:
      - name: Revalidate rollback protection immediately before recovery
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          default_branch="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}" --jq '.default_branch')"
          environment_json="$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${GITHUB_REPOSITORY}/environments/governed-canary-rollback")"
          jq -e '
            .name == "governed-canary-rollback" and
            .deployment_branch_policy.protected_branches == false and
            .deployment_branch_policy.custom_branch_policies == true and
            any(
              .protection_rules[]?;
              .type == "required_reviewers" and
              .prevent_self_review == true and
              (.reviewers | length) >= 1
            )
          ' <<<"${environment_json}" >/dev/null
          branch_policies="$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${GITHUB_REPOSITORY}/environments/governed-canary-rollback/deployment-branch-policies?per_page=100")"
          jq -e --arg branch "${default_branch}" '
            .total_count == 1 and .branch_policies[0].name == $branch
          ' <<<"${branch_policies}" >/dev/null

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install the reviewed, locked rollback driver
        run: npm ci --ignore-scripts

      - name: Download the pre-mutation recovery binding
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: governed-canary-recovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/governed-canary/recovery

      - name: Download the verified rollback proposal when available
        id: final
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: governed-canary-write-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/governed-canary/write

      - name: Execute only the separately approved inverse and prove restoration
        id: restore
        env:
          CANARY_RECOVERY_PATH: ${{ runner.temp }}/governed-canary/recovery/recovery.json
          CANARY_ROLLBACK_PATH: ${{ steps.final.outcome == 'success' && format('{0}/governed-canary/write/rollback.json', runner.temp) || '' }}
          CANARY_ROLLBACK_EVIDENCE_PATH: ${{ runner.temp }}/governed-canary/evidence/rollback-evidence.json
          CANARY_DATAHUB_READ_TOKEN: ${{ secrets.CANARY_DATAHUB_READ_TOKEN }}
          CANARY_DATAHUB_WRITE_TOKEN: ${{ secrets.CANARY_DATAHUB_WRITE_TOKEN }}
          ROLLBACK_BINDING: ${{ needs.approval.outputs.rollback_proposal_digest || needs.prepare.outputs.recovery_digest }}
        run: |
          set -euo pipefail
          : "${CANARY_DATAHUB_READ_TOKEN:?CANARY_DATAHUB_READ_TOKEN is required}"
          : "${CANARY_DATAHUB_WRITE_TOKEN:?CANARY_DATAHUB_WRITE_TOKEN is required}"
          echo "::add-mask::${CANARY_DATAHUB_READ_TOKEN}"
          echo "::add-mask::${CANARY_DATAHUB_WRITE_TOKEN}"
          mkdir -p "$(dirname "${CANARY_ROLLBACK_EVIDENCE_PATH}")"
          test -f "${CANARY_RECOVERY_PATH}"
          test ! -L "${CANARY_RECOVERY_PATH}"
          if [[ -n "${CANARY_ROLLBACK_PATH}" ]]; then
            test -f "${CANARY_ROLLBACK_PATH}"
            test ! -L "${CANARY_ROLLBACK_PATH}"
          fi
          node --import tsx scripts/governed-canary.ts rollback
          chmod 0600 "${CANARY_ROLLBACK_EVIDENCE_PATH}"
          evidence_digest="$(jq -er \
            '.digest | select(test("^sha256:[a-f0-9]{64}$"))' \
            "${CANARY_ROLLBACK_EVIDENCE_PATH}")"
          disposition="$(jq -er '.disposition' \
            "${CANARY_ROLLBACK_EVIDENCE_PATH}")"
          {
            echo "path=${CANARY_ROLLBACK_EVIDENCE_PATH}"
            echo "evidence_digest=${evidence_digest}"
          } >>"${GITHUB_OUTPUT}"
          {
            echo "### Freshly approved rollback"
            echo
            echo "- Binding approved by this environment: \`${ROLLBACK_BINDING}\`"
            echo "- Result: \`${disposition}\`"
            echo "- Read-after-rollback evidence: \`${evidence_digest}\`"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Prepare exact canary evidence attestation
        id: predicate
        if: >-
          needs.approval.result == 'success' &&
          needs.approval.outputs.rollback_proposal_digest != ''
        env:
          CANARY_ROLLBACK_EVIDENCE_PATH: ${{ steps.restore.outputs.path }}
          RECOVERY_DIGEST: ${{ needs.prepare.outputs.recovery_digest }}
          ROLLBACK_PROPOSAL_DIGEST: ${{ needs.approval.outputs.rollback_proposal_digest }}
          ROLLBACK_EVIDENCE_DIGEST: ${{ steps.restore.outputs.evidence_digest }}
        run: |
          set -euo pipefail
          evidence_dir="$(dirname "${CANARY_ROLLBACK_EVIDENCE_PATH}")"
          (
            cd "${evidence_dir}"
            sha256sum rollback-evidence.json >rollback-subject.sha256
          )
          jq -n \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg workflowRunId "${GITHUB_RUN_ID}" \
            --arg deploymentRunId "${CANARY_DEPLOYMENT_RUN_ID}" \
            --arg releaseSha "${CANARY_RELEASE_SHA}" \
            --arg recoveryDigest "${RECOVERY_DIGEST}" \
            --arg rollbackProposalDigest "${ROLLBACK_PROPOSAL_DIGEST}" \
            --arg rollbackEvidenceDigest "${ROLLBACK_EVIDENCE_DIGEST}" \
            '{
              schemaVersion: "archon.governed-canary-attestation/v1",
              repository: $repository,
              workflowRunId: $workflowRunId,
              deploymentRunId: $deploymentRunId,
              releaseSha: $releaseSha,
              recoveryDigest: $recoveryDigest,
              rollbackProposalDigest: $rollbackProposalDigest,
              rollbackEvidenceDigest: $rollbackEvidenceDigest,
              result: "write-verified-and-rollback-proven"
            }' >"${evidence_dir}/attestation-predicate.json"
          {
            echo "checksums=${evidence_dir}/rollback-subject.sha256"
            echo "predicate=${evidence_dir}/attestation-predicate.json"
            echo "directory=${evidence_dir}"
          } >>"${GITHUB_OUTPUT}"

      - name: Attest the exact governed canary evidence
        if: >-
          needs.approval.result == 'success' &&
          needs.approval.outputs.rollback_proposal_digest != ''
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ${{ steps.predicate.outputs.checksums }}
          predicate-type: https://github.com/upgradedev/archon-datahub/attestations/governed-canary/v1
          predicate-path: ${{ steps.predicate.outputs.predicate }}

      - name: Retain sanitized rollback and read-after-rollback evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: governed-canary-rollback-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/governed-canary/evidence/
          if-no-files-found: warn
          retention-days: 90
